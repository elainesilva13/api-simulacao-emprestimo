quarkus.profile=dev

quarkus.rest-client.apisparatestes.url=https://apisparatestes-ecru.vercel.app/


quarkus.http.port=9000

%dev.quarkus.datasource.db-kind=mysql
%dev.quarkus.datasource.username=root
%dev.quarkus.datasource.password=root
%dev.quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/emprestimos?createDatabaseIfNotExist=true

%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.log.sql=true

quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG

quarkus.rest-client."org.supernani.domain.emprestimo.EmprestimoService".scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client."org.supernani.domain.emprestimo.EmprestimoResorce".scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client."org.supernani.domain.taxaJuros.TaxaJurosRestClient".scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client.disable-default-mapper=true